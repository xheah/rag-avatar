[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    e2e: marks tests as end-to-end (requires live backend + frontend server)
    voice: marks tests as voice-mode E2E (requires WAV fixtures and API keys)
    vad: marks tests that depend on Silero VAD detecting audio in headless Chrome (slow, skip with -m "not vad")
    api: marks tests that make live Groq/Cartesia/Deepgram API calls (subject to rate limits; skip with -m "not api" for mock-only runs)
    slow: marks long-running tests (speaking state requires TTS pipeline; skip with -m "not slow")
